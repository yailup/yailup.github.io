    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #053B49;

            height: 100vh;

        }

        #free-trial button{
            width: 180px;
            height: 35px;
            margin-right: 25px;
            margin-bottom: 2px;
            font-size: 18px;
            background-color: transparent;
            border: 1px solid #ffffff;
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            transition: .5s;
        }
        #free-trial button:hover{
            background-color: #ff914d;
            border: none;
            text-decoration: none;
        }

        #rodappe{
            text-align: center;
            padding: 10px;

            color: #acacac;
            position:fixed;
            bottom: 0;
            width: 100%;

            background-color: #01171c;

            justify-content: left;
            align-items: left;
            box-shadow: 2px 0 0 #ff914d;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            transition: .4s;
            overflow: hidden;
        }
        nav-2.menu-lateral:hover{
            width: 300px;
        }
        .btn-expand{
            width: 100%;
            padding-left: 5px;
            font-size: 50px;
        }
        .btn-expand > i{
            color: #fff;
            font-size: 30px;

        }
        ul{
            height: 100%;
            list-style-type: none;
        }
        ul li.item-menu{
            border-radius: 20px 0 0 20px;
            transition: .4s;
        }
        ul li.ativo{
            background-color: #ff914d;
        }
        ul li.item-menu:hover{
            background-color: #ff914d;
            width: 100%;
        }
        ul li.item-menu a{
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            padding: 20px 4%;
            display: flex;
            margin-bottom: 20px;
            line-height: 40px;
        }
        ul li.item-menu a .txt-link{
            margin-left: 70px;
            transition: .7s;
            opacity: 0;
        }

        nav-2.menu-lateral:hover .txt-link{
            margin-left: 40px;
            opacity: 1;
        }


        ul li.item-menu a .icon > i{
            font-size: 30px;
        }
        /* Hidden logo */
        .logo img{
            display: none;
        }
        .logotipo img{
            max-width: 25px;
            margin-left: 10px;
            margin-bottom: 35px;
        }

        .passbox{
            width: 400px;
            height: 350px;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: fixed;
            border-radius: 25px;
            border: 2px solid #ff914d;
            background-color: #053B49;
            padding: 30px;
            box-shadow: 0 0 50px #00161c;
        }
        .passbox .passlock{
            align-items: center;
            justify-content: center;
            display: inline;
            padding: 10px;
        }

        #logotop{
            width: 10%;
        }

        #password{
            width: 100%;
            height: 40px;
            border-radius: 20px;
            border: none;
            background-color: #7b7b7b67;
            text-align: center;
            color: #fff;
        }
        #senha{
            color: #fff;
            padding: 5px;
        }
        #username{
            width: 100%;
            height: 40px;
            border-radius: 20px;
            border: none;
            background-color: #7b7b7b67;
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
        }
        #entrar{
            width: 100px;
            height: 35px;
            margin-bottom: 5px;
            background-color: #ff914d;
            margin-bottom: 5px;
            margin-top: 15px;
            color: #fff;
            border: none;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: .4s;
        }
        #entrar:hover{
            background: #f47e35;
            box-shadow: 0 0 10px #ff914d;
        }

        #error-message{
            color: rgb(250, 48, 48);
            padding: 5px;
            display: none;
        }

        #content{
            display: none;
        }
        #content2{
            display: none;
            width: 100%;
        }
        #password-prompt {
            margin-top: 20px;
        }

        .conteudo{
            width: 100%;
            height: 100%;

            margin-left: 85px;
            align-items: left;
            align-content: left;

        .conteudo h3{

        .btn-contact{

            transition: .5s;

        .btn-contact:hover{

            border: none;
            text-decoration: none;
        }

<!-- Scripts -->
<script>

    function checkPassword() {
        var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            var correctUsername = "filoliveira.me@gmail.com"; 
            var correctPassword = "123"; 

            if (username === correctUsername && password === correctPassword) {
                document.getElementById("password-prompt").style.display = "none";
                document.getElementById("passbox").style.display = "none";
                document.getElementById("content").style.display = "block";
                document.getElementById("content2").style.display = "block";
            } else {
                document.getElementById("error-message").style.display = "block";
            }
        }
        
        function submitOnEnter(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        }
    
</script>
