    <link rel="stylesheet" href="style.css">
    <style>
        /* Add styles for logo and navbar text color when body has 'scrolled' class */
        body.scrolled .logo {

    </div>

    <div id="home" class="section">
        <div class="content">
            <h1>Efficiency and productivity for your business</h1>
            <p>Wanna know how? Click below and check it out!</p>
            <div>
                <button type="button"><span></span>LEARN MORE</button>
                <button type="button"><span></span>CONTACT US</button>
            </div>
        </div>
    </div>

    <div id="about" class="section">
